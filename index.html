<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jarvis - OpenAI</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a0a;color:#eee;font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;align-items:center;height:100vh}
    .chat{width:100%;max-width:600px;height:90vh;background:#111;border-radius:16px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 20px #0ff3}
    .header{background:#131313;padding:16px;text-align:center;font-size:1.5rem;border-bottom:2px solid #0ff;color:#0ff}
    .messages{flex:1;padding:12px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
    .msg{padding:10px 14px;border-radius:18px;max-width:80%;line-height:1.4}
    .user{background:#0ff3;align-self:flex-end}
    .bot{background:#222;align-self:flex-start}
    .input-area{display:flex;padding:12px;background:#1a1a1a;border-top:1px solid #333}
    #input{flex:1;padding:10px 14px;border-radius:24px;border:none;background:#2a2a2a;color:white;outline:none;font-size:1rem}
    #send{background:#0ff;border:none;padding:10px 20px;border-radius:24px;margin-left:8px;font-weight:bold;cursor:pointer}
  </style>
</head>
<body>
  <div class="chat">
    <div class="header">⚡ J.A.R.V.I.S. (OpenAI)</div>
    <div class="messages" id="msgs">
      <div class="msg bot">Greetings, sir. I'm Jarvis. How may I assist?</div>
    </div>
    <div class="input-area">
      <input id="input" type="text" placeholder="Ask anything..." autofocus>
      <button id="send">Send</button>
    </div>
  </div>
  <script>
    // 1. PUT YOUR REAL OPENAI KEY HERE (replace the entire text inside the quotes)
    const OPENAI_KEY = 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
    const API_URL = "https://api.openai.com/v1/chat/completions";

    const msgs = document.getElementById("msgs");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    // Jarvis personality
    const systemMessage = {
      role: "system",
      content: "You are Jarvis, a sophisticated AI assistant. Be witty, helpful, and sometimes call the user 'sir'. Keep replies concise."
    };

    function addMessage(text, role) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
      return div;
    }

    // Check key on page load
    window.onload = function() {
      if (OPENAI_KEY === "sk-REPLACE_WITH_YOUR_ACTUAL_OPENAI_SECRET_KEY") {
        addMessage("⚠️ Please replace the placeholder API key in index.html", "bot");
      } else if (!OPENAI_KEY.startsWith("sk-")) {
        addMessage("⚠️ API key might be invalid (should start with sk-).", "bot");
      } else {
        addMessage("✅ API key set. I'm ready, sir.", "bot");
      }
    };

    async function askJarvis(question) {
      addMessage(question, "user");
      const typing = addMessage("...", "bot");
      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${OPENAI_KEY}`
          },
          body: JSON.stringify({
            model: "gpt-3.5-turbo",
            messages: [
              systemMessage,
              { role: "user", content: question }
            ],
            temperature: 0.7,
            max_tokens: 300
          })
        });
        const data = await response.json();
        typing.remove();
        if (data.choices && data.choices[0]?.message?.content) {
          addMessage(data.choices[0].message.content.trim(), "bot");
        } else if (data.error) {
          addMessage("❌ " + data.error.message, "bot");
        } else {
          addMessage("❌ Unexpected response. Check console.", "bot");
        }
      } catch (err) {
        typing.remove();
        addMessage("❌ Network error. Check connection or API key.", "bot");
      }
    }

    sendBtn.addEventListener("click", function() {
      const q = input.value.trim();
      if (q) {
        askJarvis(q);
        input.value = "";
      }
    });

    input.addEventListener("keypress", function(e) {
      if (e.key === "Enter") sendBtn.click();
    });
  </script>
</body>
</html>
